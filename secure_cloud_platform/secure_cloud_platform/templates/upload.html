{% extends "base.html" %}
{% block title %}Upload File{% endblock %}
{% block content %}
<div class="auth-card">
  <h2>Upload File</h2>
  <p class="hint">Your file is encrypted with a unique key before it touches the disk.</p>
  <form method="POST" action="{{ url_for('files.upload') }}" enctype="multipart/form-data">
    <label for="file">Choose file</label>
    <input type="file" id="file" name="file" required>
    <button type="submit" class="btn btn-primary">Encrypt &amp; Upload</button>
  </form>
  <a href="{{ url_for('files.dashboard') }}" class="back-link">&larr; Back to dashboard</a>
</div>
{% endblock %}
