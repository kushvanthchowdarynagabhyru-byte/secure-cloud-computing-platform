{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}
{% block content %}
<div class="auth-card error-card">
  <h2>Error {{ code }}</h2>
  <p>{{ message }}</p>
  <a href="{{ url_for('files.dashboard') if current_user.is_authenticated else url_for('auth.login') }}" class="btn btn-primary">Go Home</a>
</div>
{% endblock %}
