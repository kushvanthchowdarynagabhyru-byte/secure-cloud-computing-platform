{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-card">
  <h2>Create Account</h2>
  <form method="POST" action="{{ url_for('auth.register') }}">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" value="{{ username or '' }}" required autofocus>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" value="{{ email or '' }}" required>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required minlength="8">

    <label for="confirm_password">Confirm Password</label>
    <input type="password" id="confirm_password" name="confirm_password" required minlength="8">

    <button type="submit" class="btn btn-primary">Register</button>
  </form>
  <p class="auth-switch">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
</div>
{% endblock %}
